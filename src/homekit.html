<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="./foundation.css">
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
<form>
    <div class="row">
        <div class="medium-12 columns">
            <h4>Apple HomeKit Configuration</h4>
        </div>
    </div>

    <div class="row">
        <div class="medium-12 columns">
            <label>
                Bridge Name
                <input type="text" name="hk_bridge_name" id="hk_bridge_name" autocomplete="off" maxlength="255" class="form-control" value="" />
            </label>
        </div>
    </div>

    <div class="row">
        <div class="medium-12 columns">
            <label>
                Pairing PIN
                <input type="text" name="hk_pin" id="hk_pin" autocomplete="off" maxlength="255" class="form-control" value="" />
            </label>
        </div>
    </div>

    <div class="row">
        <div class="medium-12 columns">
            <label>
                Bridge Username (MAC-like)
                <input type="text" name="hk_username" id="hk_username" autocomplete="off" maxlength="255" class="form-control" value="" />
            </label>
        </div>
    </div>

    <div class="row">
        <div class="medium-12 columns">
            <label>
                Debug Logging
                <input type="checkbox" name="hk_debug_logging" id="hk_debug_logging" class="form-control"/>
            </label>
        </div>
    </div>

    <div class="row">
        <div class="medium-12 columns">
            <label>
                Enabled
                <input type="checkbox" name="hk_enabled" id="hk_enabled" class="form-control"/>
            </label>
        </div>
    </div>

    <div class="row">
        <div class="medium-12 columns">
            <button class="large expanded button" type="submit">Save</button>
        </div>
    </div>
</form>
</body>
<script>
    require('./homekit.js')
</script>
</html>
